<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- body styles -->
    <style>
      * {
        font-family: "Manrope", sans-serif;
      }
    </style>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />

    

    <title>Job Application Tracker</title>
  </head>
<body>
    <header
      class="sticky top-0 z-10 max-w-[1110px] mx-auto pt-15 pb-7 border-b-2 border-gray-200"
    >
      <h1 class="font-bold text-[32px] mb-4">Job Application Tracker</h1>
      <div class="card grid grid-cols-3 gap-4">
        <div class="shadow-lg p-5 bg-white rounded-lg">
          <p class="text-[14px] font-medium">Total</p>
          <h2 class="total text-[24px] font-bold">8</h2>
        </div>
        <div class="shadow-lg p-5 bg-white rounded-lg">
          <p class="text-[14px] font-medium">Interview</p>
          <h2 id="interview-count" class="text-[24px] font-bold text-green-600">0</h2>
        </div>
        <div class="shadow-lg p-5 bg-white rounded-lg">
          <p class="text-[14px] font-medium">Rejected</p>
          <h2 id="rejected-count" class="text-[24px] font-bold text-red-600">0</h2>
        </div>
      </div>
    </header>
    

     <!-- js file for interactions -->
     <script src="count.js"></script>
    <script src="script.js"></script>
</body>
</html>
